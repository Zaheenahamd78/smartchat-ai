<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChat AI - All Features</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-gradient-start: #1a1f2e;
            --bg-gradient-end: #0f1219;
            --chat-bg: #ffffff;
            --header-bg-start: #0f172a;
            --header-bg-end: #1e293b;
            --message-bot-bg: white;
            --message-user-bg: #3b82f6;
            --text-color: #1e293b;
            --quick-btn-bg: #f1f5f9;
            --input-bg: white;
            --border-color: #e2e8f0;
        }

        body.dark {
            --bg-gradient-start: #0a0a0a;
            --bg-gradient-end: #000000;
            --chat-bg: #1a1a1a;
            --header-bg-start: #000000;
            --header-bg-end: #1a1a1a;
            --message-bot-bg: #2d2d2d;
            --message-user-bg: #2563eb;
            --text-color: #f1f5f9;
            --quick-btn-bg: #3f3f46;
            --input-bg: #2d2d2d;
            --border-color: #3f3f46;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            background: var(--chat-bg);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 750px;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--header-bg-start) 0%, var(--header-bg-end) 100%);
            padding: 15px 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .title-section h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #a5f3c3;
            margin-top: 4px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8);}
            50% { opacity: 1; transform: scale(1.2);}
        }

        .header-buttons {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .messages-area {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bot-message {
            justify-content: flex-start;
        }

        .user-message {
            justify-content: flex-end;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 14px;
            line-height: 1.45;
            word-wrap: break-word;
        }

        .bot-message .bubble {
            background: var(--message-bot-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            color: var(--text-color);
        }

        .user-message .bubble {
            background: var(--message-user-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bubble pre {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            color: #d4d4d4;
        }
        .bubble code {
            background: #1e1e1e;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        .bubble ul, .bubble ol {
            margin-left: 20px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: var(--message-bot-bg);
            border-radius: 22px;
            width: fit-content;
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typingAnim 1.2s infinite ease;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingAnim {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .quick-replies {
            padding: 12px 16px;
            background: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .quick-btn {
            background: var(--quick-btn-bg);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .input-area {
            padding: 12px 16px 18px;
            background: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        .input-area button {
            background: #3b82f6;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-area button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .mic-btn {
            background: #8b5cf6;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="header-info">
            <div class="avatar">⚡</div>
            <div class="title-section">
                <h2>SmartChat AI</h2>
                <div class="status">
                    <span class="online-dot"></span>
                    <span>Groq • Llama 3 • FREE</span>
                </div>
            </div>
        </div>
        <div class="header-buttons">
            <button class="icon-btn" id="themeToggleBtn" title="Dark/Light Mode">🌙</button>
            <button class="icon-btn" id="exportTxtBtn" title="Export as TXT">📄</button>
            <button class="icon-btn" id="exportPdfBtn" title="Export as PDF">📑</button>
            <button class="icon-btn" id="clearChatBtn" title="Clear Chat">🗑️</button>
        </div>
    </div>

    <div class="messages-area" id="messagesArea"></div>

    <div class="quick-replies" id="quickReplies">
        <button class="quick-btn" data-msg="What are your pricing plans?">💰 Pricing</button>
        <button class="quick-btn" data-msg="Tell me about your features">⚙️ Features</button>
        <button class="quick-btn" data-msg="What are your support hours?">⏰ Support Hours</button>
        <button class="quick-btn" data-msg="Tell me about free trial">🎁 Free Trial</button>
        <button class="quick-btn" data-msg="Tell me a joke in Hindi">😂 Joke</button>
        <button class="quick-btn" data-msg="What is machine learning?">🤖 ML</button>
    </div>

    <div class="input-area">
        <button class="icon-btn mic-btn" id="micBtn" title="Voice Input">🎤</button>
        <input type="text" id="messageInput" placeholder="Type or speak..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
    // ========== BACKEND CONFIGURATION ==========
    // API key backend mein .env file mein safely stored hai
    const BACKEND_URL = "http://localhost:3000";
    
    // Check backend connection on load
    async function checkBackendConnection() {
        try {
            const response = await fetch(`${BACKEND_URL}/api/health`);
            if (response.ok) {
                console.log("✅ Backend connected!");
                return true;
            }
        } catch (error) {
            console.warn("⚠️ Backend not running. Start with: node server.js");
            return false;
        }
    }
    
    // ========== REST OF THE CODE ==========
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const quickBtns = document.querySelectorAll('.quick-btn');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const exportTxtBtn = document.getElementById('exportTxtBtn');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const micBtn = document.getElementById('micBtn');

    let isLoading = false;
    let isDarkMode = localStorage.getItem('darkMode') === 'true';
    let chatHistory = [];

    function loadChatHistory() {
        const saved = localStorage.getItem('smartchat_history');
        if (saved) {
            chatHistory = JSON.parse(saved);
            messagesArea.innerHTML = '';
            chatHistory.forEach(msg => {
                addMessageToUI(msg.text, msg.isUser);
            });
        } else {
            const welcomeMsg = "🤖 Namaste! Main **Groq Llama 3** se chalta hoon (100% FREE).\n\nHindi ya English mein kuch bhi poocho — main real AI ki tarah jawab dunga! 😎\n\n✅ Backend connected! API key secure hai.";
            chatHistory.push({ text: welcomeMsg, isUser: false, timestamp: Date.now() });
            addMessageToUI(welcomeMsg, false);
            saveChatHistory();
        }
        scrollToBottom();
    }

    function saveChatHistory() {
        localStorage.setItem('smartchat_history', JSON.stringify(chatHistory));
    }

    function addMessageToUI(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (!isUser) {
            bubble.innerHTML = marked.parse(text);
        } else {
            bubble.innerText = text;
        }
        messageDiv.appendChild(bubble);
        messagesArea.appendChild(messageDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function clearChat() {
        if (confirm('Clear all chat history?')) {
            chatHistory = [];
            messagesArea.innerHTML = '';
            const welcomeMsg = "🤖 Chat cleared! Ask me anything... 😊";
            chatHistory.push({ text: welcomeMsg, isUser: false, timestamp: Date.now() });
            addMessageToUI(welcomeMsg, false);
            saveChatHistory();
        }
    }

    function initTheme() {
        if (isDarkMode) {
            document.body.classList.add('dark');
            themeToggleBtn.textContent = '☀️';
        } else {
            document.body.classList.remove('dark');
            themeToggleBtn.textContent = '🌙';
        }
    }

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        localStorage.setItem('darkMode', isDarkMode);
        initTheme();
    }

    function exportAsTXT() {
        let content = "SmartChat AI - Chat Export\n" + "=".repeat(50) + "\n\n";
        content += `Exported: ${new Date().toLocaleString()}\n\n`;
        chatHistory.forEach(msg => {
            const sender = msg.isUser ? "👤 User" : "🤖 SmartChat";
            content += `${sender} [${new Date(msg.timestamp).toLocaleTimeString()}]:\n${msg.text}\n\n`;
        });
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `smartchat_export_${Date.now()}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function exportAsPDF() {
        const element = document.createElement('div');
        element.style.padding = '20px';
        let content = `<h1>SmartChat AI Export</h1><p>Exported: ${new Date().toLocaleString()}</p><hr>`;
        chatHistory.forEach(msg => {
            const sender = msg.isUser ? "👤 User" : "🤖 SmartChat";
            content += `<p><strong>${sender}</strong> [${new Date(msg.timestamp).toLocaleTimeString()}]:</p>`;
            content += `<p style="margin-left:20px">${msg.text.replace(/\n/g, '<br>')}</p>`;
        });
        element.innerHTML = content;
        document.body.appendChild(element);
        html2pdf().from(element).set({ filename: `smartchat_export_${Date.now()}.pdf` }).save().then(() => {
            document.body.removeChild(element);
        });
    }

    let recognition = null;
    function initSpeechRecognition() {
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onresult = (event) => {
                messageInput.value = event.results[0][0].transcript;
                handleUserMessage(messageInput.value);
            };
        }
    }

    function startVoiceInput() {
        if (recognition) recognition.start();
        else alert('Voice input not supported. Use Chrome.');
    }

    // ========== UPDATED: Backend se connect karta hai ==========
    async function getGroqReply(userMessage) {
        try {
            const response = await fetch(`${BACKEND_URL}/api/chat`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: userMessage })
            });
            
            const data = await response.json();
            
            if (data.error) {
                console.error("Backend Error:", data.error);
                return `❌ **Error:** ${data.error}`;
            }
            
            return data.reply || "❌ No response from AI.";
        } catch (error) {
            console.error("Network Error:", error);
            return "🌐 **Cannot connect to backend!**\n\nMake sure backend is running:\n1. Open terminal in backend folder\n2. Run: `node server.js`\n3. Then refresh this page";
        }
    }

    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-message';
        typingDiv.id = 'typingMsg';
        typingDiv.innerHTML = `<div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span><span>AI soch raha hai...</span></div>`;
        messagesArea.appendChild(typingDiv);
        scrollToBottom();
    }

    function hideTyping() {
        document.getElementById('typingMsg')?.remove();
    }

    async function handleUserMessage(message) {
        if (!message.trim() || isLoading) return;
        isLoading = true;
        sendBtn.disabled = true;
        addMessageToUI(message, true);
        chatHistory.push({ text: message, isUser: true, timestamp: Date.now() });
        saveChatHistory();
        messageInput.value = '';
        showTyping();
        const aiReply = await getGroqReply(message);
        hideTyping();
        addMessageToUI(aiReply, false);
        chatHistory.push({ text: aiReply, isUser: false, timestamp: Date.now() });
        saveChatHistory();
        isLoading = false;
        sendBtn.disabled = false;
        messageInput.focus();
    }

    function sendMessage() {
        const msg = messageInput.value;
        if (msg.trim() && !isLoading) handleUserMessage(msg);
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    quickBtns.forEach(btn => btn.addEventListener('click', () => { if (!isLoading) handleUserMessage(btn.getAttribute('data-msg')); }));
    themeToggleBtn.addEventListener('click', toggleTheme);
    exportTxtBtn.addEventListener('click', exportAsTXT);
    exportPdfBtn.addEventListener('click', exportAsPDF);
    clearChatBtn.addEventListener('click', clearChat);
    micBtn.addEventListener('click', startVoiceInput);

    initTheme();
    loadChatHistory();
    initSpeechRecognition();
    messageInput.focus();
    
    // Check backend connection on load
    checkBackendConnection();
</script>
</body>
</html>
